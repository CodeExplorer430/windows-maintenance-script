name: Windows Maintenance Framework CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Test (PS ${{ matrix.ps-version }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        ps-version: [ '5.1', '7.4' ]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up PowerShell 7.4
      if: matrix.ps-version == '7.4'
      uses: gui-dos/setup-powershell@v5
      with:
        ps-version: 7.4.x

    - name: Install Pester 5.7.x
      shell: ${{ matrix.ps-version == '5.1' && 'powershell' || 'pwsh' }}
      run: |
        Install-Module -Name Pester -Force -SkipPublisherCheck -Scope CurrentUser -MinimumVersion 5.7.0
        
    - name: Run PSScriptAnalyzer
      shell: pwsh
      run: |
        Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
        Invoke-ScriptAnalyzer -Path . -Recurse -Settings ./PSScriptAnalyzerSettings.psd1 -ErrorAction Stop

    - name: Run Pester Tests
      shell: ${{ matrix.ps-version == '5.1' && 'powershell' || 'pwsh' }}
      run: |
        ./Tests/Invoke-Tests.ps1 -CI

  docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
        
    - name: Install MkDocs
      run: |
        pip install mkdocs-material pymdown-extensions
        
    - name: Build MkDocs Site
      run: mkdocs build
